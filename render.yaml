services:
  - type: web
    name: project-04-ideology-teaching
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/init_postgres.py && python scripts/create_admin.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_REGISTRATION_MODE
        value: "invite_only"
      - key: APP_REGISTRATION_INVITE_CODES
        sync: false
      - key: APP_REGISTRATION_REUSABLE_INVITE_CODES
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_BASE
        value: https://api.deepseek.com/v1
      - key: OPENAI_MODEL
        value: deepseek-chat
