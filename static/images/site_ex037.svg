<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.6);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#overlay)"/>
  <circle cx="400" cy="180" r="60" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="180" r="100" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.15"/>
  <text x="400" y="160" font-family="serif" font-size="36" fill="#FFD700" text-anchor="middle" font-weight="bold">北大红楼与五四新文化运动</text>
  <text x="400" y="210" font-family="sans-serif" font-size="16" fill="#FFD700" text-anchor="middle" opacity="0.8">红色文化展览</text>
  <line x1="300" y1="240" x2="500" y2="240" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <text x="400" y="300" font-family="sans-serif" font-size="13" fill="#FFAAAA" text-anchor="middle">上世纪的红色印记 · 今天的精神遗产</text>
</svg>